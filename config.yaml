# Project: UdeA Atmospheric Nowcasting (Astronomy Class)
# Global settings for data retrieval and processing

api:
  base_url: "https://api.globe.gov/search/v1/marss/measurements/cloud/"
  timeout: 30 # seconds

search_defaults:
  radius_km: 5
  start_date: "2026-02-01"
  end_date: null # If null, script should default to today's date

# Team and User targeting for aggregation
targets:
  teams:
    - "Udea0311152"
  usernames:

# Location settings (Medellín/UdeA coordinates)
location:
  lat: 6.26
  lon: -75.56

# Output settings
output:
  directory: "data"
  filename: "aggregated_globe_data.csv"

# SAM segmentation
sam:
  checkpoint: "models/sam_vit_b_01ec64.pth"
  device: "mps"

segmentation:
  input_csv: "data/aggregated_globe_data.csv"
  output_csv: "data/segmented_metrics.csv"
  output_masks_dir: "data/output_masks"